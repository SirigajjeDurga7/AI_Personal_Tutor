name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    # FIXED: Switched from 'ubuntu-latest' to a stable fixed tracking version to prevent internal runner Node crashes
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        # FIXED: Switched to v3 to perfectly match older runner execution versions natively
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote rm hf || true
          git remote add hf https://oauth2:$HF_TOKEN@huggingface.co/spaces/SirigajjeDurga/Ai_Personal_Tutor
          git push hf main --force --prune
