name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # FIXED: Switched to the official Hugging Face Sync engine to handle credentials natively without errors
      - name: Push to Hub
        uses: huggingface/github-action@v1
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_id: SirigajjeDurga/Ai_Personal_Tutor
          repo_type: space
